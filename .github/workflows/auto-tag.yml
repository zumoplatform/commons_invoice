# Auto-tag the repo on every push to main with a "cap at 9, carry over"
# version scheme:
#
#   v1.0.0 → v1.0.1 → ... → v1.0.9 → v1.1.0 → ... → v1.9.9 → v2.0.0
#
# Each component (major / minor / patch) wraps from 9 back to 0 and
# carries one into the next. This is *not* SemVer — consumers should
# expect any tag bump to potentially include behaviour changes.
#
# The job reads the highest existing tag, computes the next one, and
# pushes it. Skips itself when HEAD is already a tagged commit
# (so the v1.0.0 bootstrap commit doesn't double-tag).

name: auto-tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next tag
        id: bump
        run: |
          set -euo pipefail
          # Latest semver-shaped tag (vMAJOR.MINOR.PATCH); if none, start at v1.0.0.
          LAST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
          if [ -z "$LAST" ]; then
            NEXT="v1.0.0"
          else
            STRIPPED="${LAST#v}"
            MAJOR="${STRIPPED%%.*}"
            REST="${STRIPPED#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST##*.}"
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 9 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
              if [ "$MINOR" -gt 9 ]; then
                MINOR=0
                MAJOR=$((MAJOR + 1))
              fi
            fi
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "last=$LAST" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Last: ${LAST:-<none>} -> Next: $NEXT"

      - name: Skip if HEAD already tagged
        id: check
        run: |
          if git tag --points-at HEAD | grep -q '^v[0-9]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "HEAD already has a version tag, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEXT="${{ steps.bump.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"
